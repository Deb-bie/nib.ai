name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "tests/**"
      - "pytest.ini"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "tests/**"
      - "pytest.ini"
      - ".github/workflows/backend.yml"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check backend/ tests/

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint

    env:
      DATABASE_URL: "sqlite:///:memory:"
      GROQ_API_KEY: test-key-not-used
      GROQ_MODEL: llama-3.3-70b-versatile
      WHISPER_MODEL: base

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install everything except the heavy ML packages that tests don't exercise.
          # torch, openai-whisper, numba, llvmlite are skipped to keep CI fast.
          grep -v -E "^(torch|openai-whisper|numba|llvmlite)==" backend/requirements.txt \
            | pip install -r /dev/stdin

      - name: Run tests
        run: |
          PYTHONPATH=.:backend pytest tests/ -v --tb=short
